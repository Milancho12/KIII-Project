apiVersion: apps/v1
kind: Deployment
metadata:
  name: topmarket-app
  namespace: topmarket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: topmarket-app
  template:
    metadata:
      labels:
        app: topmarket-app
    spec:
      containers:
      - name: app
        image: milan071/topmarket:latest # TODO: Update this with your DockerHub username
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: topmarket-svc
  namespace: topmarket
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: topmarket-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: topmarket-ingress
  namespace: topmarket
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: topmarket.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: topmarket-svc
            port:
              number: 80
